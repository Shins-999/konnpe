<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学内コンペ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <header>
        <!--　タイトル -->
        <h1>博多駅南アカデミック</h1>

        <!-- メニューバー -->
        <nav>
            <ul>
                <li><a href="home.html">ホーム</a></li>
                <li><a href="index.html">筋トレ</a></li>
                <li><a href="game.html">ミニゲーム</a></li>
                <li><a href="image.html">画像</a></li>
            </ul>
        </nav>

    </header>

    <!-- サイド演出 -->
    <div class="side-deco right">
        <img width="150" height="400" src="img/山本Image.png" alt="" class="img image-deco-left">
        <img width="150" height="400" src="img/翼Image.png" alt="" class="img image-deco-right">
        <img width="150" height="400" src="img/山本Image.png" alt="" class="img image-deco-left">
        <img width="150" height="400" src="img/翼Image.png" alt="" class="img image-deco-right">
        <img width="150" height="400" src="img/山本Image.png" alt="" class="img image-deco-left">
    </div>


    <div class="side-deco left">
        <img width="150" height="400" src="img/翼Image.png" alt="" class="img image-deco-right">
        <img width="150" height="400" src="img/山本Image.png" alt="" class="img image-deco-left">
        <img width="150" height="400" src="img/翼Image.png" alt="" class="img image-deco-right">
        <img width="150" height="400" src="img/山本Image.png" alt="" class="img image-deco-left">
        <img width="150" height="400" src="img/翼Image.png" alt="" class="img image-deco-right">
    </div>


    <main>

        <!-- 説を唱える -->
        <section class="section">

            <!-- 唱えるぶぶん -->
            <div class="text">
                <p>
                    山本は中学生の時まではバスケをしていて、シックスパックだった。
                    <br>しかし今では、体重は60gになり、腹筋は割れていない。
                    <br>四ヶ月後に迫った大学でモテモテになるために、筋トレをすることを決意！
                </p>

                <div class="setsu">
                    <img src="img/main_setsu.jpeg" alt="">
                </div>

                <p>
                    山本が取り筋トレの方法として選んだのは、ダンス。いろいろなダンスを踊ってみます。
                </p>
            </div>

        </section>

        <!-- 筋トレ過程 -->
        <section class="section">

            <!-- 文章部分 -->
            <div class="text">
                <p>
                    山本はいろんなダンスで運動しました。
                </p>
            </div>

            <!-- 横に乗っける、画像部分 -->
            <div class="image">
                <img width="600" height="auto" src="img/danceImage_1.png" alt="">
                <img width="600" height="auto" src="img/danceImage_2.png" alt="">
                <img width="600" height="auto" src="img/danceImage_3.png" alt="">
            </div>

        </section>

        <!-- まとめ -->
        <section class="section">

            <!-- 文章部分 -->
            <div class="text">
                <p>
                    結構楽しかったし、痩せた気がするからダンスで筋トレはいいと思います！
                    <br>これで大学でモテモテだ〜〜〜
                </p>
            </div>

        </section>

    </main>

    <script src="js/index.js"></script>
</body>

</html>
